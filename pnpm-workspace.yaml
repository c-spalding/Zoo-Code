packages:
    - "src" # Should be apps/vscode
    - "webview-ui" # Should be apps/vscode-webview
    - "apps/*"
    - "packages/*"

# pnpm 10 no longer reads the "pnpm" field from the root package.json.
# onlyBuiltDependencies and overrides must live here in pnpm-workspace.yaml.
onlyBuiltDependencies:
    - "@vscode/ripgrep"

overrides:
    tar-fs: ">=3.1.1"
    esbuild: "0.28.0"
    rollup: "4.60.4"
    vite: "8.0.14"
    undici: ">=6.24.0"
    form-data: ">=4.0.4"
    bluebird: ">=3.7.2"
    glob: ">=11.1.0"
    "@types/react": "^18.3.23"
    "@types/react-dom": "^18.3.5"
    zod: "3.25.76"
    protobufjs: ">=7.5.5"
    basic-ftp: ">=5.2.0"
    jws: ">=4.0.1"
    axios: ">=1.16.0"
    path-to-regexp: ">=8.4.0"
    fast-xml-parser: ">=5.3.5"
    "@xmldom/xmldom": ">=0.8.13"
    minimatch: ">=10.2.3"
    "@vscode/vsce>minimatch": "^3.1.2"
    preact: ">=10.26.10"
    dompurify: ">=3.4.0"
    ip-address: ">=10.1.1"
